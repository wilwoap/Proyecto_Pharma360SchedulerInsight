name: build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-x64:
    name: Release x64
    runs-on: [self-hosted, Windows, X64, p360-build]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify repository hygiene
        shell: powershell
        run: .\eng\verify-repository.ps1

      - name: Restore and rebuild
        shell: powershell
        run: .\build.ps1 -Configuration Release -Target Rebuild

      - name: Verify dependency policy
        shell: powershell
        run: .\eng\verify-dependencies.ps1

      - name: Generate and validate SPDX SBOM
        shell: powershell
        run: .\eng\generate-sbom.ps1 -Configuration Release -PackageVersion 1.0.0

      - name: Upload SPDX SBOM
        uses: actions/upload-artifact@v7
        with:
          name: SchedulerP360Insight-spdx
          path: artifacts/sbom/_manifest/spdx_2.2/manifest.spdx.json
          if-no-files-found: error
          retention-days: 30
